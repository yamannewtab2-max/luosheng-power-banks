<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Viewer — Luosheng Power Banks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#f0c27f;--gold-light:#f5d6a8;--bg:#06080e;--text:#eaeef5;--text-muted:#7f8a9e;
      --transition:0.4s cubic-bezier(0.23,1,0.32,1);
    }
    body{
      font-family:'Outfit',system-ui,sans-serif;
      background:var(--bg);color:var(--text);
      overflow:hidden;height:100vh;
      -webkit-font-smoothing:antialiased;
    }

    /* ─── Toolbar ─── */
    .toolbar{
      position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
      z-index:9999;
      display:flex;align-items:center;gap:0.75rem;
      padding:0.7rem 1.2rem 0.7rem 1.5rem;
      background:rgba(6,8,14,0.82);
      backdrop-filter:blur(24px) saturate(1.5);
      -webkit-backdrop-filter:blur(24px) saturate(1.5);
      border:1px solid rgba(240,194,127,0.12);
      border-radius:60px;
      box-shadow:0 8px 40px rgba(0,0,0,0.6);
    }
    .design-name{
      font-size:0.78rem;font-weight:600;color:var(--gold-light);
      letter-spacing:0.04em;min-width:100px;text-align:center;
    }
    .design-name .num{color:var(--text-muted);font-weight:400}
    .btn-rotate{
      display:inline-flex;align-items:center;justify-content:center;
      gap:0.4rem;
      padding:0.55rem 1.2rem;border:none;border-radius:50px;
      background:linear-gradient(135deg,var(--gold),#d4a04a);
      color:#1a1206;font-weight:700;font-size:0.82rem;
      cursor:pointer;
      transition:all var(--transition);
      font-family:'Outfit',sans-serif;
      white-space:nowrap;
    }
    .btn-rotate:hover{
      transform:scale(1.04);
      box-shadow:0 4px 20px rgba(240,194,127,0.3);
    }
    .btn-rotate:active{transform:scale(0.97)}
    .btn-rotate .icon{display:inline-block;transition:transform 0.5s ease}
    .btn-rotate:hover .icon{transform:rotate(180deg)}
    .btn-link{
      display:inline-flex;align-items:center;gap:0.3rem;
      padding:0.55rem 1rem;border-radius:50px;
      border:1px solid rgba(240,194,127,0.2);
      background:transparent;
      color:var(--gold-light);font-size:0.78rem;font-weight:500;
      cursor:pointer;text-decoration:none;
      transition:all var(--transition);
      font-family:'Outfit',sans-serif;
      white-space:nowrap;
    }
    .btn-link:hover{border-color:var(--gold);background:rgba(240,194,127,0.06)}
    .dot-group{display:flex;gap:6px;align-items:center}
    .dot{
      width:8px;height:8px;border-radius:50%;
      border:1px solid rgba(240,194,127,0.2);
      background:transparent;
      transition:all var(--transition);
      cursor:pointer;padding:0;
    }
    .dot.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(240,194,127,0.3)}
    .dot:hover{border-color:var(--gold-light)}
    .toolbar-divider{width:1px;height:24px;background:rgba(240,194,127,0.1)}

    /* ─── Iframe ─── */
    .viewer{width:100%;height:100vh;border:none;display:block}

    /* ─── Back button ─── */
    .back-btn{
      position:fixed;top:1rem;left:1rem;z-index:9999;
      padding:0.4rem 1rem;border-radius:50px;
      border:1px solid rgba(240,194,127,0.15);
      background:rgba(6,8,14,0.6);
      backdrop-filter:blur(12px);
      color:var(--gold-light);font-size:0.78rem;font-weight:500;
      text-decoration:none;
      transition:all var(--transition);
      font-family:'Outfit',sans-serif;
    }
    .back-btn:hover{border-color:var(--gold);background:rgba(240,194,127,0.08)}

    /* ─── Responsive ─── */
    @media(max-width:640px){
      .toolbar{bottom:1rem;padding:0.5rem 0.8rem;gap:0.5rem;border-radius:40px;flex-wrap:nowrap}
      .design-name{font-size:0.7rem;min-width:70px}
      .btn-rotate{padding:0.4rem 0.8rem;font-size:0.72rem}
      .btn-link{display:none}
      .toolbar-divider{display:none}
      .back-btn{font-size:0.7rem;padding:0.3rem 0.7rem}
    }
  </style>
</head>
<body>
  <a href="../" class="back-btn">← Designs</a>

  <iframe class="viewer" id="designFrame" src="dark-gold/"></iframe>

  <div class="toolbar">
    <span class="design-name" id="designName"><span class="num">1/3</span> Dark Gold</span>
    
    <div class="toolbar-divider"></div>
    
    <div class="dot-group" id="dotGroup">
      <button class="dot active" data-index="0" aria-label="Design 1"></button>
      <button class="dot" data-index="1" aria-label="Design 2"></button>
      <button class="dot" data-index="2" aria-label="Design 3"></button>
    </div>

    <button class="btn-rotate" id="rotateBtn">
      <span class="icon">⟳</span> Rotate
    </button>

    <a class="btn-link" id="openNewTab" href="dark-gold/" target="_blank">↗ Open</a>
  </div>

  <script>
    const designs = [
      { name: 'Dark Gold',      path: 'dark-gold/',      color: '#f0c27f' },
      { name: 'Clean White',    path: 'light-premium/',  color: '#2c166e' },
      { name: 'Industrial Teal',path: 'industrial-teal/',color: '#50c8b4' },
    ]

    let current = 0
    const frame = document.getElementById('designFrame')
    const nameEl = document.getElementById('designName')
    const dots = document.querySelectorAll('.dot')
    const rotateBtn = document.getElementById('rotateBtn')
    const newTabLink = document.getElementById('openNewTab')

    function showDesign(index) {
      if (index < 0) index = designs.length - 1
      if (index >= designs.length) index = 0
      current = index
      const d = designs[current]
      
      // Update iframe
      frame.src = d.path
      
      // Update label
      nameEl.innerHTML = `<span class="num">${current+1}/${designs.length}</span> ${d.name}`
      
      // Update dots
      dots.forEach((dot, i) => dot.classList.toggle('active', i === current))
      
      // Update Open link
      newTabLink.href = d.path
    }

    // Button click
    rotateBtn.addEventListener('click', () => showDesign(current + 1))

    // Dot clicks
    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => showDesign(i))
    })

    // Keyboard: left/right arrows
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault()
        showDesign(current + 1)
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault()
        showDesign(current - 1)
      }
    })

    // Touch swipe on frame
    let startX = 0
    frame.addEventListener('load', () => {
      // We can't swipe inside the iframe easily, so just keyboard is fine
    })

    // Auto-rotate animation on the icon when clicked
    rotateBtn.addEventListener('click', function() {
      const icon = this.querySelector('.icon')
      icon.style.transform = 'rotate(360deg)'
      setTimeout(() => { icon.style.transition = 'none'; icon.style.transform = 'rotate(0deg)'; setTimeout(() => { icon.style.transition = 'transform 0.5s ease' }, 10) }, 500)
    })
  </script>
</body>
</html>
