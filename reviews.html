<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packing Process — Dongguan Luosheng Digital Technology Firm</title>
  <meta name="description" content="Watch our packing process — strict QC inspection before shipping. Premium used power banks wholesale." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..900&family=Playfair+Display:ital,wght@0,600..900;1,600..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page" style="padding-bottom:3rem">
    <div class="page-wide">
      <a href="/" class="back-link">← Back to Home</a>
      <div class="page-header">
        <span class="page-header__icon">📋</span>
        <h1 class="page-header__title">Packing Process</h1>
        <p class="page-header__sub">Watch how we pack and prepare your orders</p>
      </div>
      <div style="text-align:center;margin-bottom:2rem">
        <a href="https://wa.me/8618026937104" target="_blank" class="btn btn--whatsapp" style="display:inline-flex;max-width:340px;padding:0.7rem 1.5rem;font-size:0.85rem">📲 Contact Us on WhatsApp</a>
      </div>

      <h2 class="review-section-title">Our packing process:</h2>
      <div style="max-width:560px;margin:0 auto 2.5rem">
        <div class="carousel-viewport">
          <div class="carousel-track" id="carouselTrack">
            <div class="carousel-slide">
              <video src="album-video.mp4" poster="album-video-1-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="carousel-label">Packing process step 1</span>
            </div>
            <div class="carousel-slide">
              <video src="album-video-2.mp4" poster="album-video-2-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="carousel-label">Packing process step 2</span>
            </div>
            <div class="carousel-slide">
              <video src="album-video-3.mp4" poster="album-video-3-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="carousel-label">Packing process step 3</span>
            </div>
            <div class="carousel-slide">
              <video src="album-video-5.mp4" poster="album-video-5-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="carousel-label">Packing process step 4</span>
            </div>
            <div class="carousel-slide">
              <video src="album-video-7.mp4" poster="album-video-7-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="carousel-label">Packing process step 5</span>
            </div>
            <div class="carousel-slide">
              <video src="album-video-4.mp4" poster="album-video-4-poster.jpg" controls playsinline preload="metadata"></video>
              <span class="carousel-label">Packing process step 6</span>
            </div>
          </div>
          <button class="carousel-arrow carousel-arrow--prev" id="prevBtn" aria-label="Previous">◀</button>
          <button class="carousel-arrow carousel-arrow--next" id="nextBtn" aria-label="Next">▶</button>
        </div>
        <div class="carousel-counter" id="carouselCounter">1 / 6</div>
        <div class="carousel-dots" id="carouselDots"></div>
      </div>
    </div>
  </div>

  <script>
    const track = document.getElementById('carouselTrack')
    const prevBtn = document.getElementById('prevBtn')
    const nextBtn = document.getElementById('nextBtn')
    const counter = document.getElementById('carouselCounter')
    const dotsContainer = document.getElementById('carouselDots')
    const slides = track.querySelectorAll('.carousel-slide')
    const videos = track.querySelectorAll('video')
    const total = slides.length
    let current = 0
    let autoTimer = null

    for (let i = 0; i < total; i++) {
      const dot = document.createElement('button')
      dot.className = 'carousel-dot' + (i === 0 ? ' active' : '')
      dot.setAttribute('aria-label', 'Go to step ' + (i + 1))
      dot.addEventListener('click', () => goTo(i))
      dotsContainer.appendChild(dot)
    }

    function goTo(index) {
      if (index < 0) index = 0
      if (index >= total) index = total - 1
      current = index
      track.style.transform = 'translateX(-' + (current * 100) + '%)'
      counter.textContent = (current + 1) + ' / ' + total
      prevBtn.disabled = current === 0
      nextBtn.disabled = current === total - 1
      slides.forEach((s, i) => {
        s.style.display = 'flex'
        s.style.flexDirection = 'column'
        s.style.justifyContent = i === current ? 'center' : 'flex-start'
        s.style.minHeight = i === current ? '100%' : ''
      })
      dotsContainer.querySelectorAll('.carousel-dot').forEach((d, i) => {
        d.classList.toggle('active', i === current)
      })
      restartAuto()
    }

    function restartAuto() {
      if (autoTimer) clearInterval(autoTimer)
      autoTimer = setInterval(() => {
        const anyPlaying = [...videos].some(v => !v.paused)
        if (!anyPlaying) goTo((current + 1) % total)
      }, 4000)
    }

    prevBtn.addEventListener('click', () => goTo(current - 1))
    nextBtn.addEventListener('click', () => goTo(current + 1))
    prevBtn.addEventListener('click', restartAuto)
    nextBtn.addEventListener('click', restartAuto)

    let startX = 0, endX = 0
    const viewport = document.querySelector('.carousel-viewport')
    viewport.addEventListener('touchstart', (e) => { startX = e.changedTouches[0].screenX }, {passive: true})
    viewport.addEventListener('touchend', (e) => {
      endX = e.changedTouches[0].screenX
      const diff = startX - endX
      if (Math.abs(diff) > 50) {
        if (diff > 0 && current < total - 1) goTo(current + 1)
        else if (diff < 0 && current > 0) goTo(current - 1)
      }
    }, {passive: true})

    goTo(0)
  </script>
</body>
</html>
